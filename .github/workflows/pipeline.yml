name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || github.event.inputs.action == 'apply'

    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
      alb_dns: ${{ steps.export.outputs.alb_dns }}

    env:
      TF_VAR_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Create Terraform State Bucket
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket already exists"
          else
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ecommerce-devops-lab/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Outputs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]' | paste -sd "," -)
          ALB=$(terraform output -raw alb_dns_name)

          echo "instance_ips=$IPS" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$ALB" >> "$GITHUB_OUTPUT"

          echo "EC2 Public IPs: $IPS"
          echo "ALB DNS: http://$ALB"

  ansible:
    name: Configure Servers
    runs-on: ubuntu-latest
    needs: terraform

    if: github.event_name == 'push' || github.event.inputs.action == 'apply'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          printf "%s" "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory
        run: |
          echo "[web]" > inventory.ini

          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            if [ -n "$ip" ]; then
              echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini
            fi
          done

          cat inventory.ini

      - name: Wait for SSH
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          for i in {1..20}; do
            ansible all -i inventory.ini -m ping && exit 0
            echo "SSH not ready yet... retry $i"
            sleep 15
          done
          exit 1

      - name: Run Ansible Deployment
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml

      - name: Show Application URL
        run: |
          echo "Application URL:"
          echo "http://${{ needs.terraform.outputs.alb_dns }}"

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ecommerce-devops-lab/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve